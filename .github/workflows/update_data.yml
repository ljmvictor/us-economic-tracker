name: Daily Macro Data Pipeline

# 1. The Trigger
on:
  schedule:
    # This cron expression means: Minute 0, Hour 22 (UTC) 
    # 22:00 UTC is exactly 6:00 PM US Eastern Time. 
    # The '1-5' means Monday through Friday.
    - cron: '0 22 * * 1-5'
  
  # This line allows you to manually click a "Run" button on GitHub's website to test it anytime
  workflow_dispatch: 

# 2. The Cloud Computer Setup
jobs:
  update-data:
    runs-on: ubuntu-latest # This is the Linux virtual machine

    steps:
    # Step A: Download your code onto the cloud computer
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step B: Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # Step C: Install your libraries from requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step D: Run your Python script using the secure vault key
    - name: Run data pipeline script
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python src/data_pipeline.py

    # Step E: Save the new CSVs and push them back to your repository
    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/*.csv
        # The '|| exit 0' ensures the pipeline doesn't fail if the market was closed and no data changed
        git commit -m "Automated daily data update" || exit 0
        git push